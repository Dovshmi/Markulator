<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#07111f" />
    <meta name="description" content="Markulator — מחשבון סבולות מודרני להמרת אינצ׳ים למילימטרים." />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Markulator" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/markulator-icon.svg" type="image/svg+xml" />
    <title>Markulator | מחשבון סבולות</title>
  </head>
  <body dir="rtl">
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('markulator-theme-v1') || 'auto';
          var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
          var resolvedTheme = savedTheme === 'light' || savedTheme === 'dark' ? savedTheme : prefersLight ? 'light' : 'dark';
          document.documentElement.style.colorScheme = resolvedTheme;
          document.body.classList.add('theme-' + resolvedTheme);
        } catch (error) {
          document.documentElement.style.colorScheme = 'dark';
          document.body.classList.add('theme-dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
